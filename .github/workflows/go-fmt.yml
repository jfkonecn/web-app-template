name: Go Format Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  go-fmt:
    name: go fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run go fmt
        run: go fmt ./...

      - name: Verify formatting is clean
        run: git diff --exit-code
