name: Backend Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-tests:
    name: go test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run backend tests
        run: go test ./...
