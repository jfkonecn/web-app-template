<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link href="/static/styles.css" rel="stylesheet" />
  </head>
  <body class="min-h-screen bg-stone-950 text-stone-100">
    <main class="relative isolate flex min-h-screen items-center justify-center overflow-hidden px-6 py-16">
      <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,rgba(251,191,36,0.18),transparent_28%),radial-gradient(circle_at_80%_20%,rgba(56,189,248,0.2),transparent_22%),linear-gradient(180deg,#0c0a09_0%,#1c1917_100%)]"></div>
      <div class="relative w-full max-w-md rounded-[2rem] border border-white/10 bg-white/5 p-8 shadow-2xl shadow-black/30 backdrop-blur">
        <p class="text-xs font-semibold uppercase tracking-[0.35em] text-amber-300">Web App Template</p>
        <h1 class="mt-4 text-4xl font-black tracking-tight text-white">Login</h1>
        <p class="mt-3 text-sm leading-6 text-stone-300">
          This page is a placeholder. Submitting the form returns <code class="rounded bg-white/10 px-2 py-1 text-xs text-amber-200">200 OK</code>
          without authenticating yet.
        </p>
        {{ if .Submitted }}
        <div class="mt-6 rounded-2xl border border-emerald-400/30 bg-emerald-400/10 px-4 py-3 text-sm text-emerald-200">
          Login flow is not implemented yet. Request accepted.
        </div>
        {{ end }}
        <form class="mt-8 space-y-5" method="post" action="/login">
          <div>
            <label class="mb-2 block text-sm font-medium text-stone-200" for="email">Email</label>
            <input
              class="w-full rounded-2xl border border-white/10 bg-stone-900/80 px-4 py-3 text-sm text-white outline-none ring-0 placeholder:text-stone-500 focus:border-amber-300"
              id="email"
              name="email"
              type="email"
              placeholder="you@example.com"
            />
          </div>
          <div>
            <label class="mb-2 block text-sm font-medium text-stone-200" for="password">Password</label>
            <input
              class="w-full rounded-2xl border border-white/10 bg-stone-900/80 px-4 py-3 text-sm text-white outline-none ring-0 placeholder:text-stone-500 focus:border-amber-300"
              id="password"
              name="password"
              type="password"
              placeholder="Enter your password"
            />
          </div>
          <button
            class="w-full rounded-full bg-amber-300 px-5 py-3 text-sm font-semibold text-stone-950 transition hover:bg-amber-200"
            type="submit"
          >
            Sign in
          </button>
        </form>
      </div>
    </main>
  </body>
</html>
